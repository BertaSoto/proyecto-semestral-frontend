name: Build Push Deploy Frontend ECR

on:
  push:
    branches:
      - deploy

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login a Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
          docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

      - name: Build imagen frontend
        run: |
          docker build \
            -t ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest \
            -t ${{ secrets.ECR_REPO_URL_FRONTEND }}:${{ github.sha }} \
            .

      - name: Push imagen frontend
        run: |
          docker push ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest
          docker push ${{ secrets.ECR_REPO_URL_FRONTEND }}:${{ github.sha }}

      - name: Deploy frontend en EC2 Web con SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_WEB_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy frontend desde GitHub Actions hacia EC2 Web" \
            --parameters 'commands=[
              "export AWS_REGION=${{ secrets.AWS_REGION }}",
              "export ECR_REGISTRY=${{ secrets.ECR_REGISTRY }}",
              "aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY",
              "docker pull ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest",
              "docker stop frontend-despacho || true",
              "docker rm frontend-despacho || true",
              "docker run -d --name frontend-despacho --restart always -p 80:80 ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest",
              "docker ps"
            ]'
