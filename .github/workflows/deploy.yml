name: Build Push Deploy Frontend

on:
  push:
    branches:
      - deploy

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build imagen frontend
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/despacho-frontend:latest .

      - name: Push imagen frontend
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/despacho-frontend:latest
